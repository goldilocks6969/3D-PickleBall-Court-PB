    <rect x="100" y="0" width="100" height="30" rx="15" fill="#4CAF50" opacity="0.3"/><text x="150" y="20" font-family="system-ui" font-size="12" fill="#A5D6A7" text-anchor="middle">No Backend</text>
    <rect x="210" y="0" width="120" height="30" rx="15" fill="#FF9800" opacity="0.3"/><text x="270" y="20" font-family="system-ui" font-size="12" fill="#FFCC80" text-anchor="middle">JPEG Export</text>
