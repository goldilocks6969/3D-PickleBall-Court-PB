    <line x1="0" y1="0" x2="0" y2="400"/><line x1="40" y1="0" x2="40" y2="400"/><line x1="80" y1="0" x2="80" y2="400"/><line x1="120" y1="0" x2="120" y2="400"/><line x1="160" y1="0" x2="160" y2="400"/><line x1="200" y1="0" x2="200" y2="400"/><line x1="240" y1="0" x2="240" y2="400"/><line x1="280" y1="0" x2="280" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/><line x1="360" y1="0" x2="360" y2="400"/><line x1="400" y1="0" x2="400" y2="400"/><line x1="440" y1="0" x2="440" y2="400"/><line x1="480" y1="0" x2="480" y2="400"/><line x1="520" y1="0" x2="520" y2="400"/><line x1="560" y1="0" x2="560" y2="400"/><line x1="600" y1="0" x2="600" y2="400"/><line x1="640" y1="0" x2="640" y2="400"/><line x1="680" y1="0" x2="680" y2="400"/><line x1="720" y1="0" x2="720" y2="400"/><line x1="760" y1="0" x2="760" y2="400"/><line x1="800" y1="0" x2="800" y2="400"/><line x1="840" y1="0" x2="840" y2="400"/><line x1="880" y1="0" x2="880" y2="400"/><line x1="920" y1="0" x2="920" y2="400"/><line x1="960" y1="0" x2="960" y2="400"/><line x1="1000" y1="0" x2="1000" y2="400"/><line x1="1040" y1="0" x2="1040" y2="400"/><line x1="1080" y1="0" x2="1080" y2="400"/><line x1="1120" y1="0" x2="1120" y2="400"/><line x1="1160" y1="0" x2="1160" y2="400"/>
